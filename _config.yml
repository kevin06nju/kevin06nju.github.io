title: Kevin's AI Learning Hub
description: AI 学习经验与技术分享
url: "https://kevin06nju.github.io"
baseurl: ""

# Build settings
markdown: kramdown
highlighter: rouge
permalink: /:year/:month/:day/:title/

# Kramdown settings
kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    block:
      line_numbers: false

# Pagination
plugins:
  - jekyll-paginate
  - jekyll-seo-tag

paginate: 10
paginate_path: "/page/:num/"

# Exclude from build
exclude:
  - README.md
  - LICENSE
  - params.json
  - .claude
  - DESIGN.md

# Topic definitions (slug → display info)
topics:
  ai-basics:
    name: "AI 基础"
    description: "人工智能基础概念、学习路线与入门指南"
    icon: "🧠"
    gradient: "linear-gradient(135deg, #667eea 0%, #764ba2 100%)"
  llm:
    name: "大语言模型"
    description: "LLM 原理、应用与前沿进展"
    icon: "🤖"
    gradient: "linear-gradient(135deg, #f093fb 0%, #f5576c 100%)"
  tools:
    name: "工具与实践"
    description: "AI 开发工具、框架使用与实战技巧"
    icon: "🛠"
    gradient: "linear-gradient(135deg, #4facfe 0%, #00f2fe 100%)"

# Author info
author:
  name: "Kevin"
  bio: "AI learner & developer, sharing insights along the journey."
  github: "kevin06nju"

# Default front matter
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
